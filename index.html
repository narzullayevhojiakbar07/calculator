<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            background: black;
            align-items: center;
        }

        .container {
            width: 430px;
        }

        .header {
            border: 1px solid black;
            background-color: rgb(20, 19, 19);
            border: 1px solid gray;
            height: 100px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .button-wrapper{
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(5, 100px);
        }

        button {
            border-radius: 10px;
            font-size: 22px;
            background-color: gray;
            border: 1px solid black;
            color: #fff;
        }

        button:hover {
            background-color: blue;
            color: white;
        }

        .subtitle, .title {
            padding: 0 20px;
            text-align: end;
            color: gray;
        }

        .subtitle {
            opacity: 0.3;
        }
        
        .title {
            color: #fff;
        }

        .qora1:hover {
            background: linear-gradient(135deg, rgb(255, 0, 144), rgb(255, 184, 235));
            color: #fff;
        }

        .qora2:hover {
            background: linear-gradient(135deg, rgb(255, 0, 144), rgb(255, 184, 235));
            color: #fff;
        }

        .qora3:hover {
            background: linear-gradient(135deg, rgb(255, 0, 144), rgb(255, 184, 235));
            color: #fff;
        }

        .qora4:hover {
            background: linear-gradient(135deg, rgb(255, 0, 144), rgb(255, 184, 235));
            color: #fff;
        }

        .qora5:hover {
            background: linear-gradient(135deg, rgb(255, 0, 144), rgb(255, 184, 235));
            color: #fff;
        }
    </style>
</head> 


<body>
    <div class="container">
        <div class="header">
            <h2 class="title"></h2>
            <h1 class="subtitle"></h1>
        </div>
        <div class="button-wrapper">
            <button onclick="reset()">C</button>
            <button onclick="deleteNumber()">🖊</button>
            <button onclick="append('%')">%</button>
            <button class="qora1" onclick="append('/')" >/</button>
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="qora2" onclick="append('*')" >*</button>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="qora3" onclick="append('-')" >-</button>
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="qora4" onclick="append('+')" >+</button>
            <button onclick="append('+/-')">+/-</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="qora5" onclick="result()" >=</button>
        </div>
    </div>
    <script>
        const elTitle = document.querySelector(".title")
        const elSubTitle = document.querySelector(".subtitle")

        function append (value) {
            if(value === '+/-') {
                elTitle.innerHTML = elTitle.innerHTML * -1
            }else {
                return elTitle.innerHTML += value
            }
        }

        function result(){
            try{
                let calculation = elTitle.innerHTML.replace('%', '/100*')
                elSubTitle.innerHTML = elTitle.innerHTML
                elTitle.innerHTML = eval(calculation)
            }
            catch(e){
                return elTitle.innerHTML = "Xatolik"
            }
        }

        function reset(){
            elSubTitle.innerHTML =""
            return elTitle.innerHTML =""
        }

        function deleteNumber(){
            let text = elTitle.innerHTML
            text = text.split("")
            text.pop()
            return elTitle.innerHTML = text.join("")
        }
    </script>
</body>
</html>
